<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="RoadQuest mark">
  <title>RoadQuest mark</title>
  <desc>Shield with road lanes and a small controller motif</desc>

  <!-- Rounded shield -->
  <path d="M60 10
           L92 24
           C92 24 96 28 96 44
           C96 60 84 78 60 98
           C36 78 24 60 24 44
           C24 28 28 24 28 24
           L60 10 Z"
        fill="#F59E0B" />

  <!-- Road lanes -->
  <path d="M40 40 H80" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M40 56 H80" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M40 72 H80" stroke="#FFFFFF" stroke-width="6.5" stroke-linecap="round"/>
  <path d="M46 82 C52 78 64 76 72 82" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Small controller, lower-right -->
  <rect x="74.5" y="64.5" width="12" height="9" rx="3" fill="#3B82F6"/>
  <rect x="76.5" y="66" width="8" height="3" rx="1.25" fill="#FFFFFF"/>
  <circle cx="77" cy="69.5" r="0.9" fill="#FFFFFF"/>
  <circle cx="82.5" cy="69.5" r="0.9" fill="#FFFFFF"/>
</svg>
